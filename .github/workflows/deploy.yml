name: Deploy VitalAxis to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggers

env:
  DOCKER_IMAGE: tayraps/vitalaxis
  AWS_REGION: af-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE }}:latest
          ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
        cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
        cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Get EC2 instance IPs
      id: get_ips
      run: |
        # Get private IPs of instances in the Auto Scaling Group
        INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
          --auto-scaling-group-names vitalaxis-asg \
          --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
          --output text)
        
        PRIVATE_IPS=""
        for ID in $INSTANCE_IDS; do
          IP=$(aws ec2 describe-instances \
            --instance-ids $ID \
            --query 'Reservations[0].Instances[0].PrivateIpAddress' \
            --output text)
          PRIVATE_IPS="$PRIVATE_IPS $IP"
        done
        
        echo "private_ips=$(echo $PRIVATE_IPS | tr ' ' ',')" >> $GITHUB_OUTPUT

    - name: Deploy to EC2 instances
      env:
        PRIVATE_IPS: ${{ steps.get_ips.outputs.private_ips }}
        SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
      run: |
        # Save SSH key
        echo "$SSH_PRIVATE_KEY" > vitalaxis-key.pem
        chmod 600 vitalaxis-key.pem
        
        # Deploy to each instance
        IFS=',' read -ra IPS <<< "$PRIVATE_IPS"
        for IP in "${IPS[@]}"; do
          echo "íş€ Deploying to $IP..."
          
          ssh -o StrictHostKeyChecking=no -i vitalaxis-key.pem ubuntu@$IP << 'EOF'
            # Pull latest image
            docker pull tayraps/vitalaxis:latest
            
            # Stop and remove old container
            docker stop vitalaxis-app || true
            docker rm vitalaxis-app || true
            
            # Run new container
            docker run -d \
              --name vitalaxis-app \
              --restart unless-stopped \
              -p 5000:5000 \
              -e DATABASE_URL=postgresql://vitalaxis_user:ChangeMe123!@${{ secrets.RDS_ENDPOINT }}/vitalaxisdb \
              tayraps/vitalaxis:latest
            
            # Wait for container to start
            sleep 5
            
            # Health check
            if curl -f http://localhost:5000/health; then
              echo "âś… Deployment successful on $IP"
            else
              echo "âťŚ Health check failed on $IP"
              exit 1
            fi
