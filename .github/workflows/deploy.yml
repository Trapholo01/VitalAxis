name: Deploy VitalAxis to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: tayraps/vitalaxis
  AWS_REGION: af-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance IDs
        id: get_instances
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names vitalaxis-asg \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text)
          
          echo "instance_ids=$(echo $INSTANCE_IDS | tr ' ' ',')" >> $GITHUB_OUTPUT
          echo "Found instances: $INSTANCE_IDS"

      - name: Deploy to EC2 instances via Session Manager
        env:
          INSTANCE_IDS: ${{ steps.get_instances.outputs.instance_ids }}
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
        run: |
          if [ -z "$INSTANCE_IDS" ]; then
            echo "No instances found"
            exit 1
          fi
          
          IFS=',' read -ra IDS <<< "$INSTANCE_IDS"
          for ID in "${IDS[@]}"; do
            echo "Deploying to instance: $ID"
            
            # Use SSM send-command instead of start-session (works better in CI)
            aws ssm send-command \
              --instance-ids "$ID" \
              --document-name "AWS-RunShellScript" \
              --parameters commands="'
                sudo docker pull ${{ env.DOCKER_IMAGE }}:latest
                sudo docker stop vitalaxis-app || true
                sudo docker rm vitalaxis-app || true
                sudo docker run -d \
                  --name vitalaxis-app \
                  --restart unless-stopped \
                  -p 5000:5000 \
                  -e DATABASE_URL=postgresql://vitalaxis_user:ChangeMe123!@$RDS_ENDPOINT/vitalaxisdb \
                  ${{ env.DOCKER_IMAGE }}:latest
                sleep 5
                curl -f http://localhost:5000/health
              '" --comment "Deploying VitalAxis" --output text
            
            echo "Deployment command sent to $ID"
          done

      - name: Wait for deployment
        run: sleep 30

      - name: Verify deployment
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names vitalaxis-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          
          echo "Application URL: http://$ALB_DNS"
          curl -f "http://$ALB_DNS/health" || echo "Health check failed - check instances manually"
