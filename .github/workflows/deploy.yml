name: Deploy VitalAxis to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: tayraps/vitalaxis
  AWS_REGION: af-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 instance IPs
        id: get_ips
        run: |
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names vitalaxis-asg \
            --query 'AutoScalingGroups[0].Instances[?LifecycleState==`InService`].InstanceId' \
            --output text)
          
          PRIVATE_IPS=""
          for ID in $INSTANCE_IDS; do
            IP=$(aws ec2 describe-instances \
              --instance-ids $ID \
              --query 'Reservations[0].Instances[0].PrivateIpAddress' \
              --output text)
            PRIVATE_IPS="$PRIVATE_IPS $IP"
          done
          
          echo "private_ips=$(echo $PRIVATE_IPS | tr ' ' ',')" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 instances
        env:
          PRIVATE_IPS: ${{ steps.get_ips.outputs.private_ips }}
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
        run: |
          if [ -z "$PRIVATE_IPS" ]; then
            echo "No instances found"
            exit 1
          fi
          
          IFS=',' read -ra IPS <<< "$PRIVATE_IPS"
          for IP in "${IPS[@]}"; do
            echo "Deploying to $IP..."
            
            # This uses Session Manager - no SSH keys needed!
            aws ssm start-session --target $IP --document-name AWS-StartInteractiveCommand --parameters command="sudo docker pull tayraps/vitalaxis:latest && sudo docker stop vitalaxis-app || true && sudo docker rm vitalaxis-app || true && sudo docker run -d --name vitalaxis-app -p 5000:5000 -e DATABASE_URL=postgresql://vitalaxis_user:ChangeMe123!@$RDS_ENDPOINT/vitalaxisdb tayraps/vitalaxis:latest"
            
            echo "Deployed to $IP successfully!"
          done

      - name: Verify deployment
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names vitalaxis-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          
          echo "Application URL: http://$ALB_DNS"
          sleep 10
          curl -f "http://$ALB_DNS/health" || echo "Health check failed"
